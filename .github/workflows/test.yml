name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

defaults:
  run:
    shell: bash

jobs:
  parser-tests:
    name: Parser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - uses: gradle/actions/setup-gradle@v4

    - name: Run parser-core tests
      run: ./gradlew :parser-core:test --continue

    - name: Upload parser test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: parser-test-results
        path: parser-core/build/test-results/test/
        retention-days: 7

  app-compile:
    name: App Compile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - uses: gradle/actions/setup-gradle@v4

    - name: Compile standard debug app
      run: ./gradlew :app:compileStandardDebugKotlin --build-cache

    - name: Upload compile report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: compile-report
        path: app/build/reports/
        retention-days: 7

  app-unit-tests:
    name: App Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - uses: gradle/actions/setup-gradle@v4

    - name: Run standard debug unit tests
      run: ./gradlew :app:testStandardDebugUnitTest --build-cache --continue

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-test-results
        path: app/build/test-results/
        retention-days: 7
